name: Bot Quet chuoichien v3.4

on:
  workflow_dispatch: # Cho phép bạn bấm nút chạy bằng tay trên web
  schedule:
    - cron: '0 */3 * * *' # Tự động chạy lại sau mỗi 3 tiếng để cập nhật kênh

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Scanner Bot
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add *.m3u
          git commit -m "🤖 Bot: Cap nhat danh sach kenh" || exit 0
          git push
